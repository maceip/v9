name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── v9-net CLI binaries (Go, static) ────────────────────────────
  build-v9-net:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build v9-net
        working-directory: cmd/v9-net
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go mod tidy
          go build -trimpath -ldflags="-s -w" -o v9-net-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-${{ matrix.suffix }}
          path: cmd/v9-net/v9-net-${{ matrix.suffix }}

  # ── v9-net Android APK (gomobile) ───────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;27.0.12077973'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          gomobile init
          echo "Go version: $(go version)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "NDK: $(ls $ANDROID_HOME/ndk/ 2>/dev/null || echo 'not found')"

      - name: Build AAR
        working-directory: pkg/v9net
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          go mod tidy
          gomobile bind -v -target=android/arm64,android/arm -androidapi 26 \
            -o ../../android/app/libs/v9net.aar .

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          find android -name '*.apk' -exec cp {} out/v9-net-android.apk \;
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-android
          path: out/v9-net-android.apk

  # ── v9 Node.js CLI (npm pack) ───────────────────────────────────
  build-v9-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pack v9 CLI
        run: |
          mkdir -p out
          TARBALL=$(npm pack --pack-destination=out/ 2>/dev/null | tail -1)
          echo "Packed: $TARBALL"
          # Rename to predictable name
          mv "out/$TARBALL" out/v9-cli.tgz || mv out/*.tgz out/v9-cli.tgz
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: v9-cli
          path: out/v9-cli.tgz

  # ── Create GitHub Release ───────────────────────────────────────
  release:
    needs: [build-v9-net, build-v9-cli]
    # Android is best-effort (continue-on-error); don't block release on it
    if: always() && needs.build-v9-net.result == 'success' && needs.build-v9-cli.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          TAG="v0.1.0-${DATE}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Generated tag: ${TAG}"

      - name: Create git tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.tag.outputs.tag }} -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin ${{ steps.tag.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Android APK may not exist if build-android failed
      - name: Download Android artifact (best-effort)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: v9-net-android
          path: artifacts

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "v9 ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          files: |
            artifacts/v9-net-*
            artifacts/v9-cli.tgz
