name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── v9-net CLI binaries (Go, static) ────────────────────────────
  build-v9-net:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build v9-net
        working-directory: cmd/v9-net
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go mod tidy
          go build -trimpath -ldflags="-s -w" -o v9-net-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-${{ matrix.suffix }}
          path: cmd/v9-net/v9-net-${{ matrix.suffix }}

  # ── v9-net Android CLI binary (Go static, cross-compiled) ───────
  # Plain ELF binary for Termux / adb shell users. Not an APK.
  build-android-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build v9-net for Android ARM64 (static binary)
        working-directory: cmd/v9-net
        env:
          GOOS: android
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: |
          go mod tidy
          go build -trimpath -ldflags="-s -w" -o v9-net-android-arm64 .
          ls -lh v9-net-android-arm64
          file v9-net-android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-android-arm64
          path: cmd/v9-net/v9-net-android-arm64

  # ── v9-net Android APK (gomobile + Gradle) ──────────────────────
  # Produces a real installable Android app that wraps the gvisor-tap-vsock
  # virtual network in a foreground service. Users can install the APK
  # directly on their phone (no root, no Termux), tap the icon, and the
  # browser at maceip.github.io/v9 connects to ws://localhost:8765.
  #
  # Reliability: continue-on-error keeps a failing APK build from blocking
  # the rest of the release (CLI binaries will still ship). Every step
  # logs its tool versions so a failure mode is diagnosable from the run log.
  build-android-apk:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-go@v5
        with:
          # gomobile@latest requires Go 1.25+. Using 1.22 worked by accident
          # via auto-toolchain download during `go install`, but `go mod tidy`
          # inside pkg/v9net after `go get golang.org/x/mobile/bind` bumps the
          # module's required go to 1.25, and subsequent commands need a
          # real 1.25 toolchain on PATH.
          go-version: '1.25'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Log Android SDK / NDK state
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_HOME/ndk/" || true
          ls -la "$ANDROID_HOME/platforms/" || true
          ls -la "$ANDROID_HOME/build-tools/" || true
          java -version
          go version

      - name: Install gomobile
        run: |
          # Use @latest — previous attempts to pin to a specific pseudo-version
          # failed because the pinned hash didn't exist in the proxy. We log
          # the resolved version below so failures are diagnosable, and the
          # whole job is continue-on-error so a breaking upstream change in
          # gomobile doesn't block the rest of the release.
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "--- gomobile init ---"
          gomobile init
          echo "--- gomobile version ---"
          gomobile version || true
          echo "--- which gomobile ---"
          which gomobile
          ls -la "$(go env GOPATH)/bin/"

      - name: Build v9net.aar with gomobile bind
        working-directory: pkg/v9net
        run: |
          # Export ANDROID_NDK_HOME from shell — the ${{ env.ANDROID_HOME }}
          # context variable isn't reliably set by setup-android@v3 at the
          # step-env level, so we resolve it at runtime from the shell env.
          # Pick the first NDK that setup-android actually installed.
          NDK_DIR=$(ls -d "$ANDROID_HOME"/ndk/* 2>/dev/null | head -1)
          if [ -z "$NDK_DIR" ]; then
            echo "FATAL: no NDK found under $ANDROID_HOME/ndk/"
            exit 1
          fi
          export ANDROID_NDK_HOME="$NDK_DIR"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          # gomobile bind imports golang.org/x/mobile/bind from the TARGET
          # module's go.mod. pkg/v9net doesn't depend on it (it's only needed
          # for the Android binding, not the Linux binary) — add it at CI
          # time. The tool's own error message literally says "run go get
          # golang.org/x/mobile/bind" when this is missing.
          go get golang.org/x/mobile/bind
          go mod tidy
          mkdir -p ../../android/app/libs
          gomobile bind \
            -v \
            -target=android/arm64,android/arm \
            -androidapi 26 \
            -o ../../android/app/libs/v9net.aar \
            .
          ls -lh ../../android/app/libs/v9net.aar
          echo "AAR contents:"
          unzip -l ../../android/app/libs/v9net.aar | head -30 || true

      - name: Build debug APK with Gradle
        working-directory: android
        run: |
          # Debug build is auto-signed with the default debug keystore,
          # so Android will install it. Release builds need a keystore
          # secret which we don't ship. The debug APK is fine for demo
          # use — users will see the "debug build" marker but it works.
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -200
          find app/build/outputs/apk -name '*.apk' -exec ls -lh {} \;

      - name: Rename and stage APK with proper extension
        run: |
          mkdir -p out
          APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_SRC" ]; then
            echo "FATAL: APK not found at $APK_SRC"
            find android -name '*.apk' -type f || true
            exit 1
          fi
          cp "$APK_SRC" out/v9-net-android-arm64.apk
          ls -lh out/v9-net-android-arm64.apk
          file out/v9-net-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-android-arm64-apk
          path: out/v9-net-android-arm64.apk

  # ── v9 Node.js CLI (npm pack) ───────────────────────────────────
  build-v9-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pack v9 CLI
        run: |
          mkdir -p out
          TARBALL=$(npm pack --pack-destination=out/ 2>/dev/null | tail -1)
          echo "Packed: $TARBALL"
          # Rename to predictable name
          mv "out/$TARBALL" out/v9-cli.tgz || mv out/*.tgz out/v9-cli.tgz
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: v9-cli
          path: out/v9-cli.tgz

  # ── Create GitHub Release ───────────────────────────────────────
  release:
    needs: [build-v9-net, build-android-cli, build-android-apk, build-v9-cli]
    runs-on: ubuntu-latest
    # Don't block the release if only the APK job failed (it's allowed to fail).
    if: always() && needs.build-v9-net.result == 'success' && needs.build-android-cli.result == 'success' && needs.build-v9-cli.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: |
          # Only consider clean semver tags (v0.1.N) not old date-based ones
          LAST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LAST" ]; then
            NEXT="v0.2.0"
          else
            MAJOR=$(echo "$LAST" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LAST" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LAST" | sed 's/^v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Release: ${NEXT}"

      - name: Create git tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.tag.outputs.tag }} -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin ${{ steps.tag.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "v9 ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          # The APK job may fail (continue-on-error: true); use fail_on_unmatched_files: false
          # so a missing .apk doesn't block the release.
          fail_on_unmatched_files: false
          files: |
            artifacts/v9-net-linux-*
            artifacts/v9-net-darwin-*
            artifacts/v9-net-windows-*
            artifacts/v9-net-android-arm64
            artifacts/v9-net-android-arm64.apk
            artifacts/v9-cli.tgz
