name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── v9-net CLI binaries (Go, static) ────────────────────────────
  build-v9-net:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build v9-net
        working-directory: cmd/v9-net
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go mod tidy
          go build -trimpath -ldflags="-s -w" -o v9-net-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-${{ matrix.suffix }}
          path: cmd/v9-net/v9-net-${{ matrix.suffix }}

  # ── v9-net Android binary (cross-compiled Go) ────────────────────
  # Plain static binary for Android ARM64 — runs via Termux or adb shell.
  # gomobile AAR/APK approach kept in android/ for future use but not
  # built in CI until the toolchain issues are resolved.
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build v9-net for Android ARM64
        working-directory: cmd/v9-net
        env:
          GOOS: android
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: |
          go mod tidy
          go build -trimpath -ldflags="-s -w" -o v9-net-android-arm64 .
          ls -lh v9-net-android-arm64
          file v9-net-android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-android-arm64
          path: cmd/v9-net/v9-net-android-arm64

  # ── v9 Node.js CLI (npm pack) ───────────────────────────────────
  build-v9-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pack v9 CLI
        run: |
          mkdir -p out
          TARBALL=$(npm pack --pack-destination=out/ 2>/dev/null | tail -1)
          echo "Packed: $TARBALL"
          # Rename to predictable name
          mv "out/$TARBALL" out/v9-cli.tgz || mv out/*.tgz out/v9-cli.tgz
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: v9-cli
          path: out/v9-cli.tgz

  # ── Create GitHub Release ───────────────────────────────────────
  release:
    needs: [build-v9-net, build-android, build-v9-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: |
          # Find the last release number and increment
          LAST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LAST" ]; then
            NEXT="v0.1.0"
          else
            # Extract patch number and increment: v0.1.42 → v0.1.43
            MAJOR=$(echo "$LAST" | cut -d. -f1)
            MINOR=$(echo "$LAST" | cut -d. -f2)
            PATCH=$(echo "$LAST" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Release: ${NEXT}"

      - name: Create git tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.tag.outputs.tag }} -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin ${{ steps.tag.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "v9 ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          files: |
            artifacts/v9-net-*
            artifacts/v9-cli.tgz
