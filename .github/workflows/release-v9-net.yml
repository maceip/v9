name: Release v9-net

on:
  push:
    tags:
      - 'v9-net-v*'

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build v9-net CLI
        working-directory: cmd/v9-net
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags="-s -w" -o v9-net-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-${{ matrix.suffix }}
          path: cmd/v9-net/v9-net-${{ matrix.suffix }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build AAR with gomobile
        working-directory: pkg/v9net
        run: |
          go mod tidy
          gomobile bind -target=android/arm64,android/arm -androidapi 26 \
            -o ../../android/app/libs/v9net.aar .

      - name: Build APK with Gradle
        working-directory: android
        run: |
          chmod +x gradlew 2>/dev/null || true
          # Use gradle wrapper or system gradle
          if [ -f gradlew ]; then
            ./gradlew assembleRelease --no-daemon
          else
            gradle assembleRelease --no-daemon
          fi

      - name: Collect APK
        run: |
          mkdir -p out
          find android -name '*.apk' -exec cp {} out/ \;
          cd out
          # Rename to include version
          for f in *.apk; do
            mv "$f" "v9-net-android-arm64.apk"
            break
          done
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: v9-net-android
          path: out/v9-net-android-arm64.apk

  release:
    needs: [build-cli, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/v9-net-*
