# Deploy static landing + full browser runtime (web + napi-bridge + wasm + Claude bundle) to GitHub Pages.
#
# If the job fails immediately with: "Branch … is not allowed to deploy to github-pages"
# → Repository Settings → Environments → github-pages → Deployment branches:
#    add `main` and `dev` (or "All branches"). Otherwise OIDC deploy is rejected and the live site stays stale.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Build EdgeJS (wasm + JS loader)
        run: |
          source "$EMSDK/emsdk_env.sh"
          make fetch
          make configure
          make build

      # wasm + loader into docs/dist/, rewrite import maps in every web/*.html, .nojekyll
      - name: Assemble docs/ (web + napi-bridge + edgejs)
        run: node scripts/prepare-github-pages.mjs

      # After prepare: CLI bundle lands next to edgejs.* (devDependency from npm ci)
      - name: Bundle Claude Code for browser (Pages + import map externals)
        run: node scripts/bundle-claude-for-pages.mjs

      - name: Verify Pages artifact (runtime + landing payload)
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/.nojekyll
          test -f docs/index.html
          test -f docs/js/v9-app.js
          test -f docs/web/index.html
          test -f docs/web/node-polyfills.js
          test -f docs/web/oauth-bridge.html
          test -f docs/napi-bridge/http-exports.js
          test -f docs/dist/edgejs.js
          test -f docs/dist/edgejs.wasm
          test -f docs/dist/claude-code-cli.js
          grep -qF '__V9_ANTHROPIC_FETCH_PROXY__' docs/web/node-polyfills.js
          grep -qF 'anthropicProxyForCLIiframe' docs/js/v9-app.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
