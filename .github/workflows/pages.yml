# Deploy docs/ to GitHub Pages.
#
# The landing page (glass terminal, zoom animations) lives in docs/ and is
# committed directly — it deploys in ~30 seconds with no build step.
#
# Runtime artifacts (wasm, CLI bundle) are built by the separate CI workflow
# and wasm-rebuild.yml.  Their absence is handled gracefully by the landing
# page ("RUNTIME UNAVAILABLE").
#
# If the job fails immediately with "Branch … is not allowed to deploy":
# → Settings → Environments → github-pages → Deployment branches → "All branches"
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Assemble web/ + napi-bridge/ into docs/ and write .nojekyll
      - name: Assemble docs/ (web + napi-bridge)
        continue-on-error: true
        run: node scripts/prepare-github-pages.mjs

      # Bundle CLI if @anthropic-ai/claude-code is available (devDependency)
      - name: Bundle Claude Code for browser
        continue-on-error: true
        run: node scripts/bundle-claude-for-pages.mjs

      - name: Verify landing page essentials
        run: |
          set -e
          test -f docs/index.html
          test -f docs/js/v9-app.js
          test -f docs/js/zoom.js
          if [ -f docs/napi-bridge/zlib.js ]; then
            grep -qF "from 'fflate'" docs/napi-bridge/zlib.js
            ! grep -qF 'node_modules/fflate' docs/napi-bridge/zlib.js
          fi
          echo "Landing page verified"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
