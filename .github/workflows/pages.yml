# Deploy docs/ to GitHub Pages.
#
# The wasm runtime (dist/edgejs.{js,wasm}) is vendored in the repo.
# If missing, the workflow falls back to downloading from the latest CI
# Integration run. Deployment FAILS if wasm is not available — the runtime
# is the product, not optional.
#
# If the job fails immediately with "Branch … is not allowed to deploy":
# → Settings → Environments → github-pages → Deployment branches → "All branches"
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Wasm should be vendored in the repo (dist/edgejs.{js,wasm}).
      # If not present (e.g. fresh repo before first build), try CI artifacts.
      - name: Ensure wasm runtime exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -f dist/edgejs.js ] && [ -f dist/edgejs.wasm ]; then
            echo "Wasm runtime found in checkout (vendored)"
            ls -la dist/edgejs.*
            exit 0
          fi

          echo "Wasm not vendored — downloading from latest CI run..."
          mkdir -p dist
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow CI --branch main \
            --status success --limit 10 --json databaseId,conclusion \
            --jq '[.[] | select(.conclusion=="success")][0].databaseId')

          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful CI run found and wasm is not vendored. Run: npm run vendor:wasm && git add dist/edgejs.js dist/edgejs.wasm && git commit"
            exit 1
          fi

          echo "Downloading from CI run $RUN_ID"
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --pattern "edgejs-wasm-*" --dir /tmp/wasm-artifacts
          find /tmp/wasm-artifacts -name 'edgejs.js' -exec cp {} dist/ \;
          find /tmp/wasm-artifacts -name 'edgejs.wasm' -exec cp {} dist/ \;

          # Hard check — no silent skip
          test -f dist/edgejs.js || { echo "::error::dist/edgejs.js missing after CI download"; exit 1; }
          test -f dist/edgejs.wasm || { echo "::error::dist/edgejs.wasm missing after CI download"; exit 1; }
          echo "Wasm runtime downloaded from CI"
          ls -la dist/edgejs.*

      # Bundle the Anthropic SDK for browser use
      - name: Bundle Anthropic SDK
        continue-on-error: true
        run: sh scripts/bundle-sdk.sh

      # Assemble web/ + napi-bridge/ into docs/ and write .nojekyll
      - name: Assemble docs/ (web + napi-bridge)
        run: node scripts/prepare-github-pages.mjs

      # Bundle CLI if @anthropic-ai/claude-code is available (devDependency)
      - name: Bundle Claude Code for browser
        continue-on-error: true
        run: node scripts/bundle-claude-for-pages.mjs

      - name: Verify deployment essentials
        run: |
          set -e
          test -f docs/index.html
          test -f docs/js/v9-app.js
          test -f docs/js/zoom.js
          # Wasm MUST be in docs/dist/ — this is not optional
          test -f docs/dist/edgejs.js || { echo "::error::docs/dist/edgejs.js missing — prepare-github-pages failed to copy wasm"; exit 1; }
          test -f docs/dist/edgejs.wasm || { echo "::error::docs/dist/edgejs.wasm missing"; exit 1; }
          if [ -f docs/napi-bridge/zlib.js ]; then
            grep -qF "from 'fflate'" docs/napi-bridge/zlib.js
            ! grep -qF 'node_modules/fflate' docs/napi-bridge/zlib.js
          fi
          echo "Deployment verified — wasm runtime present"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
