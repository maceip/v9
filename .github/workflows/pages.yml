# Deploy docs/ to GitHub Pages.
#
# The wasm runtime is required for the site to work. This workflow is
# self-sufficient: if wasm is vendored in the repo, it uses that.
# If not, it builds from source with Emscripten before deploying.
# Deployment FAILS if wasm cannot be produced.
#
# If the job fails immediately with "Branch … is not allowed to deploy":
# → Settings → Environments → github-pages → Deployment branches → "All branches"
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Ensure wasm runtime exists ───────────────────────────────
      # Priority: vendored in repo > build from source
      - name: Check for vendored wasm
        id: wasm-check
        run: |
          if [ -f dist/edgejs.js ] && [ -f dist/edgejs.wasm ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Wasm runtime found in checkout (vendored)"
            ls -la dist/edgejs.*
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Wasm not vendored — will build from source"
          fi

      - name: Setup Emscripten
        if: steps.wasm-check.outputs.found == 'false'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: tot

      - name: Build wasm from source
        if: steps.wasm-check.outputs.found == 'false'
        run: |
          source "$EMSDK/emsdk_env.sh"
          make fetch
          make configure
          make build

      - name: Verify wasm runtime and strip shebang
        run: |
          set -e
          test -f dist/edgejs.js || { echo "::error::dist/edgejs.js missing"; exit 1; }
          test -f dist/edgejs.wasm || { echo "::error::dist/edgejs.wasm missing"; exit 1; }
          # Emscripten emits #!/usr/bin/env node which breaks browser import()
          if head -1 dist/edgejs.js | grep -q '^#!'; then
            echo "Stripping shebang from dist/edgejs.js"
            sed -i '1{/^#!/d}' dist/edgejs.js
          fi
          echo "Wasm runtime verified"
          ls -la dist/edgejs.*

      # Bundle the Anthropic SDK for browser use
      - name: Bundle Anthropic SDK
        continue-on-error: true
        run: sh scripts/bundle-sdk.sh

      # Assemble web/ + napi-bridge/ into docs/ and write .nojekyll
      - name: Assemble docs/ (web + napi-bridge)
        run: node scripts/prepare-github-pages.mjs

      # Bundle CLI if @anthropic-ai/claude-code is available (devDependency)
      - name: Bundle Claude Code for browser
        continue-on-error: true
        run: node scripts/bundle-claude-for-pages.mjs

      - name: Verify deployment essentials
        run: |
          set -e
          test -f docs/index.html
          test -f docs/js/v9-app.js
          test -f docs/js/zoom.js
          # Wasm MUST be in docs/dist/
          test -f docs/dist/edgejs.js || { echo "::error::docs/dist/edgejs.js missing"; exit 1; }
          test -f docs/dist/edgejs.wasm || { echo "::error::docs/dist/edgejs.wasm missing"; exit 1; }
          if [ -f docs/napi-bridge/zlib.js ]; then
            grep -qF "from 'fflate'" docs/napi-bridge/zlib.js
            ! grep -qF 'node_modules/fflate' docs/napi-bridge/zlib.js
          fi
          echo "Deployment verified — wasm runtime present"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
