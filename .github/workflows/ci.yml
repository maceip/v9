name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  quick:
    name: Quick tier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quick tests (unit + guardrails)
        run: npm run test:quick

  integration:
    name: Integration tier
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quick
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser >/dev/null 2>&1 \
            || sudo apt-get install -y -qq chromium >/dev/null 2>&1
          CHROME_BIN_PATH="$(which chromium-browser || which chromium || which google-chrome)"
          echo "CHROME_BIN=$CHROME_BIN_PATH" >> "$GITHUB_ENV"

      # Skip Emscripten + wasm build when vendored wasm is present.
      # The repo tracks dist/edgejs.{js,wasm} so most runs skip this
      # entirely (~5 min saved). Only wasm-rebuild.yml or a missing
      # dist/ triggers a from-source build.
      - name: Check for vendored wasm
        id: wasm-check
        run: |
          if [ -f dist/edgejs.js ] && [ -f dist/edgejs.wasm ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Wasm runtime found (vendored)"
            ls -la dist/edgejs.*
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Wasm not vendored — will build from source"
          fi

      - name: Setup Emscripten
        if: steps.wasm-check.outputs.found == 'false'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.23

      - name: Build wasm from source
        if: steps.wasm-check.outputs.found == 'false'
        run: |
          source "$EMSDK/emsdk_env.sh"
          make fetch
          make configure
          make build

      - name: Verify wasm and populate build/
        run: |
          set -e
          test -f dist/edgejs.js || { echo "::error::dist/edgejs.js missing"; exit 1; }
          test -f dist/edgejs.wasm || { echo "::error::dist/edgejs.wasm missing"; exit 1; }
          # Integration tests require build/edge (CJS shim) + build/edge.js
          # + build/edge.wasm. When using vendored wasm, populate from dist/.
          if [ ! -f build/edge.js ] || [ ! -f build/edge.wasm ]; then
            mkdir -p build
            cp dist/edgejs.js build/edge.js
            cp dist/edgejs.wasm build/edge.wasm
            node scripts/write-build-edge-shim.mjs build
          fi
          ls -la dist/edgejs.* build/edge*

      - name: Upload Wasm build artifacts
        if: steps.wasm-check.outputs.found == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: edgejs-wasm-${{ github.sha }}
          retention-days: 180
          path: |
            dist/edgejs.wasm
            dist/edgejs.js

      - name: Integration tests
        run: |
          if [ -f "${EMSDK:-/nonexistent}/emsdk_env.sh" ]; then source "$EMSDK/emsdk_env.sh"; fi
          make test-integration
          make test-soak-quick

      - name: E2E shell + npm
        env:
          PLAYWRIGHT_BROWSER_PATH: ${{ env.CHROME_BIN }}
        run: npm run test:e2e:shell

  # Verify vendored wasm is present on main — auto-vendors from
  # integration tier artifacts if missing.
  wasm-vendored:
    name: Wasm vendored check
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check vendored wasm
        id: check
        run: |
          if [ -f dist/edgejs.js ] && [ -f dist/edgejs.wasm ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Vendored wasm present"
            ls -la dist/edgejs.*
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Vendored wasm missing — will download from integration artifacts"
          fi

      - name: Download wasm from integration artifacts
        if: steps.check.outputs.present == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: edgejs-wasm-*
          path: /tmp/wasm-artifacts
          merge-multiple: true

      - name: Vendor wasm and commit
        if: steps.check.outputs.present == 'false'
        run: |
          mkdir -p dist build
          find /tmp/wasm-artifacts -name 'edgejs.js' -exec cp {} dist/ \;
          find /tmp/wasm-artifacts -name 'edgejs.wasm' -exec cp {} dist/ \;
          find /tmp/wasm-artifacts -name 'edge' -exec cp {} build/ \;
          if [ ! -f dist/edgejs.js ] || [ ! -f dist/edgejs.wasm ]; then
            echo "::error::Could not find wasm in integration artifacts"
            exit 1
          fi
          ls -la dist/edgejs.*
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/edgejs.js dist/edgejs.wasm
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: auto-vendor wasm from CI [skip ci]" && \
            git push
