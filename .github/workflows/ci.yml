name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  quick:
    name: Quick tier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quick tests (unit + guardrails)
        run: npm run test:quick

  integration:
    name: Integration tier
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quick
    # Pre-baked CI image: Emscripten 4.0.23 + Chromium + Node 22.
    # Build/publish via .github/workflows/ci-image.yml or manually:
    #   docker build -f docker/Dockerfile.ci -t ghcr.io/maceip/v9-ci .
    #   docker push ghcr.io/maceip/v9-ci
    container:
      image: ghcr.io/maceip/v9-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      # Use vendored wasm when present (most runs); build from source
      # only when dist/ is empty (first clone, after distclean, etc.).
      - name: Check for vendored wasm
        id: wasm-check
        run: |
          if [ -f dist/edgejs.js ] && [ -f dist/edgejs.wasm ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Wasm runtime found (vendored)"
            ls -la dist/edgejs.*
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Wasm not vendored — will build from source"
          fi

      - name: Build wasm from source
        if: steps.wasm-check.outputs.found == 'false'
        run: |
          source "$EMSDK/emsdk_env.sh"
          make fetch
          make configure
          make build

      - name: Verify wasm
        run: |
          set -e
          test -f dist/edgejs.js || { echo "::error::dist/edgejs.js missing"; exit 1; }
          test -f dist/edgejs.wasm || { echo "::error::dist/edgejs.wasm missing"; exit 1; }
          ls -la dist/edgejs.*

      - name: Upload Wasm build artifacts
        if: steps.wasm-check.outputs.found == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: edgejs-wasm-${{ github.sha }}
          retention-days: 180
          path: |
            dist/edgejs.wasm
            dist/edgejs.js

      - name: Integration tests
        env:
          CHROME_BIN: /usr/bin/chromium-browser
        run: |
          if [ -f "$EMSDK/emsdk_env.sh" ]; then source "$EMSDK/emsdk_env.sh"; fi
          make test-integration
          make test-soak-quick

      - name: E2E shell + npm
        env:
          CHROME_BIN: /usr/bin/chromium-browser
          PLAYWRIGHT_BROWSER_PATH: /usr/bin/chromium-browser
        run: npm run test:e2e:shell

  # Verify vendored wasm is present on main — auto-vendors from
  # integration tier artifacts if missing.
  wasm-vendored:
    name: Wasm vendored check
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check vendored wasm
        id: check
        run: |
          if [ -f dist/edgejs.js ] && [ -f dist/edgejs.wasm ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Vendored wasm present"
            ls -la dist/edgejs.*
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Vendored wasm missing — will download from integration artifacts"
          fi

      - name: Download wasm from integration artifacts
        if: steps.check.outputs.present == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: edgejs-wasm-*
          path: /tmp/wasm-artifacts
          merge-multiple: true

      - name: Vendor wasm and commit
        if: steps.check.outputs.present == 'false'
        run: |
          mkdir -p dist build
          find /tmp/wasm-artifacts -name 'edgejs.js' -exec cp {} dist/ \;
          find /tmp/wasm-artifacts -name 'edgejs.wasm' -exec cp {} dist/ \;
          find /tmp/wasm-artifacts -name 'edge' -exec cp {} build/ \;
          if [ ! -f dist/edgejs.js ] || [ ! -f dist/edgejs.wasm ]; then
            echo "::error::Could not find wasm in integration artifacts"
            exit 1
          fi
          ls -la dist/edgejs.*
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/edgejs.js dist/edgejs.wasm
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: auto-vendor wasm from CI [skip ci]" && \
            git push
