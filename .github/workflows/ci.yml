name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  quick:
    name: Quick tier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quick tests (unit + guardrails)
        run: npm test

  integration:
    name: Integration tier
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: quick
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-wasm-toolchain

      - name: Upload Wasm build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: edgejs-wasm-${{ github.sha }}
          path: |
            dist/edgejs.wasm
            dist/edgejs.js
            build/edge

      - name: Integration tests
        run: |
          source "$EMSDK/emsdk_env.sh"
          make test-integration
          make test-soak-quick
