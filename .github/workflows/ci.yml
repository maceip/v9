name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  quick:
    name: Quick tier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quick tests (unit + guardrails)
        run: npm run test:quick

  integration:
    name: Integration tier
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: quick
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
          CHROME_BIN_PATH="$(which chromium-browser || which chromium || which google-chrome)"
          echo "CHROME_BIN=$CHROME_BIN_PATH" >> "$GITHUB_ENV"

      # Pin tot (~ LLD 23): 3.1.64 wasm-ld can SIGSEGV on ubuntu-latest (ImportSection::addImport)
      # — see docs/BUILD_TOOLCHAIN.md / docker/Dockerfile EMSDK_FLAVOR default.
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.23

      - name: Configure and build
        run: |
          source "$EMSDK/emsdk_env.sh"
          make fetch
          make configure
          make build

      - name: Verify wasm build output
        run: |
          set -e
          test -f dist/edgejs.js || { echo "::error::dist/edgejs.js not produced by build"; exit 1; }
          test -f dist/edgejs.wasm || { echo "::error::dist/edgejs.wasm not produced by build"; exit 1; }
          test -f build/edge || { echo "::error::build/edge not produced by build"; exit 1; }
          echo "Wasm build verified"
          ls -la dist/edgejs.*

      - name: Upload Wasm build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgejs-wasm-${{ github.sha }}
          retention-days: 180
          path: |
            dist/edgejs.wasm
            dist/edgejs.js
            build/edge

      - name: Integration tests
        run: |
          source "$EMSDK/emsdk_env.sh"
          make test-integration
          make test-soak-quick

  # Verify vendored wasm is present on main — auto-vendors from
  # integration tier artifacts if missing.
  wasm-vendored:
    name: Wasm vendored check
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check vendored wasm
        id: check
        run: |
          if [ -f dist/edgejs.js ] && [ -f dist/edgejs.wasm ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Vendored wasm present"
            ls -la dist/edgejs.*
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Vendored wasm missing — will download from integration artifacts"
          fi

      - name: Download wasm from integration artifacts
        if: steps.check.outputs.present == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: edgejs-wasm-*
          path: /tmp/wasm-artifacts
          merge-multiple: true

      - name: Vendor wasm and commit
        if: steps.check.outputs.present == 'false'
        run: |
          mkdir -p dist build
          find /tmp/wasm-artifacts -name 'edgejs.js' -exec cp {} dist/ \;
          find /tmp/wasm-artifacts -name 'edgejs.wasm' -exec cp {} dist/ \;
          find /tmp/wasm-artifacts -name 'edge' -exec cp {} build/ \;
          if [ ! -f dist/edgejs.js ] || [ ! -f dist/edgejs.wasm ]; then
            echo "::error::Could not find wasm in integration artifacts"
            exit 1
          fi
          ls -la dist/edgejs.*
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/edgejs.js dist/edgejs.wasm
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: auto-vendor wasm from CI [skip ci]" && \
            git push
