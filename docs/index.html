<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>v9</title>
  <meta name="description" content="v9 — Node.js in the browser (EdgeJS + napi-bridge). Landing page loads Claude Code in a sandboxed terminal iframe after CI builds wasm and bundle.">
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#e8e4de" media="(prefers-color-scheme: light)">

  <!-- Inline SVG favicon (Zap icon) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><polygon points='22,4 10,22 19,22 16,36 30,16 21,16' fill='%239bff00' stroke='%2300034a' stroke-width='1.5'/></svg>">

  <!-- Goldman + IBM Plex Mono — loaded async to avoid blocking render -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Goldman:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap" as="style" crossorigin onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Goldman:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>

  <!-- Friz Quadrata for non-terminal text -->
  <style>
    @font-face {
      font-family: 'Friz Quadrata';
      src: url('fonts/friz-quadrata-bold-italic.ttf') format('truetype');
      font-weight: bold;
      font-style: italic;
      font-display: swap;
    }
  </style>

  <!-- Critical inline CSS — page renders instantly -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* Kill all scrollbars */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ── Theme: Midnight (default dark) ── */
    :root, [data-theme="midnight"] {
      --bg: #0a0a0f;
      --fg: #e8e4de;
      --nav-bg: #0d0d14;
      --nav-border: #1a1a28;
      --nav-highlight: rgba(255,255,255,0.03);
      --frame-bg: #0b0b12;
      --frame-border: rgba(255,255,255,0.85);
      --frame-joint: rgba(255,255,255,0.06);
      --frame-highlight: rgba(255,255,255,0.015);
      --glass-tint: rgba(120,140,180,0.06);
      --accent: #9bff00;
      --accent-dim: rgba(155,255,0,0.15);
      --spot-color: rgba(180,200,255,0.04);
      --fog-color: rgba(10,10,15,0.85);
      --text-secondary: rgba(232,228,222,0.4);
      --overlay-bg: rgba(10,10,15,0.97);
      --icon-tint: 0;
      --crayon: #ffffff;
      color-scheme: dark;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Friz Quadrata', 'Georgia', serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body { position: relative; }

    /* ── Navbar ── */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 44px; z-index: 100;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.06) 0%,
          rgba(255,255,255,0.015) 50%,
          rgba(0,0,0,0.08) 100%),
        var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px;
      user-select: none;
      overflow: hidden;
    }

    /* Clean top highlight + subtle drop shadow */
    #navbar::before {
      content: '';
      position: absolute; inset: 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 1px 3px rgba(0,0,0,0.4),
        0 2px 8px rgba(0,0,0,0.15);
      pointer-events: none;
    }

    /* Subtle brushed texture — barely perceptible grain */
    #navbar::after {
      content: '';
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.008) 2px,
          rgba(255,255,255,0.008) 3px
        );
      pointer-events: none;
    }
    :root.light #navbar {
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.5) 0%,
          rgba(255,255,255,0.1) 50%,
          rgba(0,0,0,0.04) 100%),
        var(--nav-bg);
    }

    /* Fluid canvas overlay for navbar flourish */
    #nav-fluid {
      position: absolute; inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      mix-blend-mode: screen;
    }
    #navbar:hover #nav-fluid,
    #navbar.fluid-active #nav-fluid { opacity: 0.7; }

    /* Nav content */
    .nav-name {
      font-family: 'Goldman', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--fg);
      position: relative;
      z-index: 2;
    }

    .nav-progress {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(155,255,0,0.08);
      overflow: hidden;
      z-index: 2;
    }
    .nav-progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s ease;
      box-shadow: 0 0 8px var(--accent-dim);
    }

    /* Navbar scattered icons */
    .nav-icon {
      position: absolute;
      width: 14px; height: 14px;
      opacity: 0.35;
      z-index: 1;
      pointer-events: none;
    }
    :root.light .nav-icon { opacity: 0.25; }

    /* Navbar micro-details — subtle and clean */
    .nav-vent {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      opacity: 0.4;
    }
    .nav-vent::before {
      content: '';
      display: block;
      width: 20px; height: 6px;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 1.5px,
        var(--frame-joint) 1.5px,
        var(--frame-joint) 2px
      );
      border-radius: 1px;
    }

    .nav-seam {
      position: absolute;
      width: 1px; height: 16px;
      background: var(--frame-joint);
      transform: rotate(35deg);
      z-index: 1;
      pointer-events: none;
      opacity: 0.35;
    }

    .nav-light {
      position: absolute;
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      z-index: 1;
      pointer-events: none;
    }

    /* ── Main viewport ── */
    #viewport {
      position: fixed;
      top: 44px; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Fog overlay */
    #fog {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 20%, var(--fog-color) 70%);
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    /* Spotlight */
    #spotlight {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 50% 50% at 50% 45%, var(--spot-color) 0%, transparent 70%);
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    /* Floating background icons — interactive */
    .bg-icon {
      position: absolute;
      width: 28px; height: 28px;
      opacity: 0.4;
      z-index: 3;
      cursor: pointer;
      will-change: transform;
      transition: opacity 0.3s ease, filter 0.3s ease;
    }
    .bg-icon:hover {
      opacity: 0.85;
      transform: scale(1.6) rotate(-5deg) !important;
      filter: drop-shadow(0 0 8px var(--accent));
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease, filter 0.3s ease;
    }
    .bg-icon:active {
      transform: scale(1.3) rotate(0deg) !important;
      opacity: 1.0;
    }
    :root.light .bg-icon { opacity: 0.3; }

    /* ── Terminal container ── */
    #terminal-wrap {
      position: relative;
      width: calc(100% - 12px);
      height: calc(100% - 12px);
      z-index: 20;
      cursor: pointer;
      transform-origin: center center;
      transition: none; /* JS handles animation */
    }
    #terminal-wrap.zoomed { cursor: default; }

    /* Terminal frame — clean device bezel, white border in dark (iRobot) */
    #terminal-frame {
      position: absolute; inset: 0;
      border: 2px solid var(--frame-border);
      border-radius: 10px;
      background:
        linear-gradient(170deg,
          rgba(255,255,255,0.05) 0%,
          transparent 40%,
          rgba(0,0,0,0.06) 100%),
        var(--frame-bg);
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        inset 0 -1px 0 rgba(0,0,0,0.2),
        0 0 0 0.5px rgba(255,255,255,0.1),
        0 0 15px rgba(255,255,255,0.06),
        0 0 40px rgba(255,255,255,0.03),
        0 4px 12px rgba(0,0,0,0.25),
        0 8px 32px rgba(0,0,0,0.3),
        0 16px 64px rgba(0,0,0,0.15);
    }
    :root.light #terminal-frame {
      background:
        linear-gradient(170deg,
          rgba(255,255,255,0.4) 0%,
          transparent 40%,
          rgba(0,0,0,0.04) 100%),
        var(--frame-bg);
    }

    /* Subtle surface texture — almost invisible, just adds materiality */
    #terminal-frame::before {
      content: '';
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 3px,
          rgba(255,255,255,0.005) 3px,
          rgba(255,255,255,0.005) 4px
        );
      pointer-events: none;
      z-index: 1;
    }

    /* Frame corner icons */
    .frame-icon {
      position: absolute;
      width: 16px; height: 16px;
      opacity: 0.5;
      z-index: 2;
      pointer-events: none;
    }
    :root.light .frame-icon { opacity: 0.35; }
    .frame-icon.tl { top: 8px; left: 8px; }
    .frame-icon.tr { top: 8px; right: 8px; }

    /* ── Theme crayon — breaks the bottom-left frame border ── */
    /* Lives on #terminal-wrap (not inside #terminal-frame) so overflow:hidden doesn't clip it */
    #theme-crayon {
      position: absolute;
      bottom: -6px; left: 18px;
      width: 10px; height: 28px;
      z-index: 30;
      cursor: pointer;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #theme-crayon:hover {
      transform: translateY(-3px) scale(1.2);
    }
    #theme-crayon:active {
      transform: translateY(1px) scale(0.95);
    }
    /* Crayon SVG parts colored by --crayon var */
    .crayon-body { fill: var(--crayon, #fff); }
    .crayon-tip { fill: var(--crayon, #fff); opacity: 0.85; }
    .crayon-band { fill: rgba(0,0,0,0.2); }
    .crayon-stripe { fill: rgba(0,0,0,0.12); }
    .frame-icon.bl { bottom: 8px; left: 8px; }
    .frame-icon.br { bottom: 8px; right: 8px; }

    /* Frame micro-details — minimal, clean */
    .frame-vent {
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }
    .frame-vent::before {
      content: '';
      display: block;
      width: 32px; height: 6px;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 1.5px,
        var(--frame-joint) 1.5px,
        var(--frame-joint) 2px
      );
      border-radius: 2px;
      opacity: 0.6;
    }
    .frame-seam {
      position: absolute;
      width: 1px;
      background: var(--frame-joint);
      z-index: 2;
      pointer-events: none;
      opacity: 0.5;
    }
    .frame-joint {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.08), var(--frame-joint) 70%);
      border: 0.5px solid rgba(0,0,0,0.15);
      z-index: 2;
      pointer-events: none;
    }
    .frame-joint::after { display: none; }
    .frame-light {
      position: absolute;
      background: linear-gradient(90deg, transparent, var(--frame-highlight), transparent);
      height: 1px;
      z-index: 2;
      pointer-events: none;
      opacity: 0.5;
    }

    /* Terminal screen (glass) */
    #terminal-screen {
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--glass-tint);
      z-index: 3;
    }

    /* Glass canvas (tumble shader + liquid glass) */
    #glass-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* Terminal overlay (xterm or boot text) — bg starts visible, no flash */
    #terminal-overlay {
      position: absolute; inset: 0;
      z-index: 4;
      opacity: 0;
      transition: opacity 0.15s ease;
      background: rgba(10,10,15,0.97);
    }
    #terminal-overlay.visible { opacity: 1; }

    /* Boot text */
    #boot-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--fg);
      white-space: pre-wrap;
      line-height: 1.6;
      max-width: 600px;
      width: 90%;
    }
    .boot-line {
      display: flex; align-items: center; gap: 8px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .boot-line.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .boot-line .boot-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }
    .boot-cursor {
      display: inline-block;
      width: 8px; height: 16px;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* CLI iframe */
    #cli-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 5;
    }
    #cli-frame.visible { opacity: 1; pointer-events: auto; }

    /* ── Idle state: terminal in distance ── */
    #terminal-wrap.idle {
      transform: scale(0.42) translateY(8%);
    }

    /* ── Swipe dismiss (physics in swipe.js) ── */
    /* SwipeDismiss handles transform directly via rAF spring solver */

    /* ── Dismissed window tiles at bottom ── */
    #dismissed-tray {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      pointer-events: none;
      overflow-x: hidden;
    }
    .dismissed-tile {
      width: 64px; height: 48px;
      border-radius: 6px;
      border: 1px solid var(--frame-border);
      background: var(--frame-bg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      pointer-events: auto;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Goldman', sans-serif;
      font-size: 10px;
      color: var(--accent);
      opacity: 0.8;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .dismissed-tile:hover {
      transform: translateY(-4px) scale(1.05);
      opacity: 1;
    }

    /* ── Responsive: Pixel 9 Pro Fold folded (≤ 380px) ── */
    @media (max-width: 380px) {
      #navbar { height: 36px; padding: 0 10px; }
      .nav-name { font-size: 14px; letter-spacing: 1px; }
      .nav-vent, .nav-seam, .nav-light, .nav-icon { display: none; }
      #viewport { top: 36px; }
      #terminal-wrap {
        width: calc(100% - 6px);
        height: calc(100% - 6px);
      }
      #terminal-wrap.idle { transform: scale(0.55) translateY(5%); }
      #terminal-frame { border-radius: 8px; border-width: 1.5px; }
      #terminal-screen { top: 3px; left: 3px; right: 3px; bottom: 3px; border-radius: 4px; }
      .frame-icon { display: none; }
      .frame-joint { width: 4px; height: 4px; }
      .bg-icon { width: 20px; height: 20px; }
      #dismissed-tray { height: 56px; }
      .dismissed-tile { width: 48px; height: 36px; font-size: 8px; }
      #boot-text { font-size: 11px; }
    }

    /* ── Responsive: Pixel 9 Pro Fold expanded / tablet (381px–899px) ── */
    @media (min-width: 381px) and (max-width: 899px) {
      #navbar { height: 40px; }
      #viewport { top: 40px; }
      #terminal-wrap {
        width: calc(100% - 8px);
        height: calc(100% - 8px);
      }
      #terminal-wrap.idle { transform: scale(0.48) translateY(6%); }
      #boot-text { font-size: 13px; }
    }

    /* ── Responsive: Desktop (≥ 900px) ── */
    @media (min-width: 900px) {
      #terminal-wrap {
        width: calc(100% - 16px);
        height: calc(100% - 16px);
      }
      #terminal-wrap.idle { transform: scale(0.42) translateY(8%); }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Hide during load flicker ── */
    .loading { visibility: hidden; }
  </style>
</head>

  <!-- ── Main viewport ── -->
  <div id="viewport">
    <!-- Floating background icons -->
    <img class="bg-icon" src="icons/Terminal.svg" alt="" style="top:8%;left:5%">
    <img class="bg-icon" src="icons/Database.svg" alt="" style="top:15%;right:8%">
    <img class="bg-icon" src="icons/Wifi.svg" alt="" style="top:60%;left:3%">
    <img class="bg-icon" src="icons/Monitor.svg" alt="" style="top:75%;right:6%">

    <img class="bg-icon" src="icons/Layers.svg" alt="" style="top:5%;left:50%">
    <img class="bg-icon" src="icons/Bug.svg" alt="" style="top:45%;left:92%">
    <img class="bg-icon" src="icons/Radio.svg" alt="" style="top:50%;right:90%">
    <img class="bg-icon" src="icons/GitBranch.svg" alt="" style="top:90%;left:15%">
    <img class="bg-icon" src="icons/Wrench.svg" alt="" style="top:20%;left:30%">
    <img class="bg-icon" src="icons/Play.svg" alt="" style="top:70%;right:25%">

    <!-- Terminal -->

      <div id="terminal-frame">
        <!-- Frame micro-details -->
        <div class="frame-vent" style="top:8px;left:50%;transform:translateX(-50%)"></div>
        <div class="frame-vent" style="bottom:8px;left:50%;transform:translateX(-50%)"></div>
        <div class="frame-seam" style="top:20px;left:2px;height:30px;transform:rotate(35deg)"></div>
        <div class="frame-seam" style="top:20px;right:2px;height:30px;transform:rotate(-35deg)"></div>
        <div class="frame-seam" style="bottom:20px;left:2px;height:30px;transform:rotate(-35deg)"></div>
        <div class="frame-seam" style="bottom:20px;right:2px;height:30px;transform:rotate(35deg)"></div>
        <div class="frame-joint" style="top:4px;left:4px"></div>
        <div class="frame-joint" style="top:4px;right:4px"></div>
        <div class="frame-joint" style="bottom:4px;left:4px"></div>
        <div class="frame-joint" style="bottom:4px;right:4px"></div>
        <div class="frame-light" style="top:2px;left:20%;width:15%"></div>
        <div class="frame-light" style="bottom:2px;right:20%;width:12%"></div>
        <div class="frame-light" style="top:50%;left:1px;width:1px;height:20%;transform:translateY(-50%)"></div>

        <!-- Corner icons -->
        <img class="frame-icon tl" src="icons/Cpu.svg" alt="" loading="lazy">
        <img class="frame-icon tr" src="icons/Shield.svg" alt="" loading="lazy">
        <img class="frame-icon bl" src="icons/Zap.svg" alt="" loading="lazy">
        <img class="frame-icon br" src="icons/Terminal.svg" alt="" loading="lazy">

        <!-- Glass screen -->
        <div id="terminal-screen">
          <canvas id="glass-canvas"></canvas>

          <!-- Terminal overlay (boot text + xterm) -->
          <div id="terminal-overlay">
            <div id="boot-text"></div>
          </div>

          <!-- CLI iframe (loads real web/index.html after boot) -->
          <iframe id="cli-frame" sandbox="allow-scripts allow-same-origin allow-popups" title="Claude Code (browser runtime)"></iframe>
        </div>
      </div>

      <!-- Theme crayon — sits on terminal-wrap (not inside frame) so it breaks the border -->
      <svg id="theme-crayon" viewBox="0 0 10 28" xmlns="http://www.w3.org/2000/svg" aria-label="Change theme">
        <polygon class="crayon-tip" points="2,28 5,24 8,28"/>
        <rect class="crayon-body" x="1.5" y="2" width="7" height="22" rx="1.5"/>
        <rect class="crayon-band" x="1.5" y="7" width="7" height="1.5" rx="0.3"/>
        <rect class="crayon-band" x="1.5" y="10" width="7" height="1.5" rx="0.3"/>
        <path class="crayon-stripe" d="M2 15 Q3.5 13.5 5 15 Q6.5 16.5 8 15" stroke-width="0.8" stroke="rgba(0,0,0,0.15)" fill="none"/>
        <path class="crayon-stripe" d="M2 17.5 Q3.5 16 5 17.5 Q6.5 19 8 17.5" stroke-width="0.8" stroke="rgba(0,0,0,0.15)" fill="none"/>
        <rect class="crayon-body" x="1.5" y="0" width="7" height="4" rx="2"/>
      </svg>
    </div>
  </div>

  <!-- Dismissed window tray -->
  <div id="dismissed-tray"></div>

  <!-- Default GitHub Pages demo proxy (web/pages-proxy-default.js); override with ?proxy= or __V9_ANTHROPIC_FETCH_PROXY__. -->
  <script src="web/pages-proxy-default.js"></script>

  <!-- ── Scripts (deferred, non-blocking) ── -->
  <script type="module" src="js/v9-app.js"></script>
</body>
</html>
