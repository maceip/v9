<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>dynamic port test</title>
<script type="importmap">
{
  "imports": {
    "net": "/napi-bridge/net-exports.js", "node:net": "/napi-bridge/net-exports.js",
    "events": "/napi-bridge/events-exports.js", "node:events": "/napi-bridge/events-exports.js",
    "stream": "/napi-bridge/stream-exports.js", "node:stream": "/napi-bridge/stream-exports.js",
    "buffer": "/napi-bridge/buffer-exports.js", "node:buffer": "/napi-bridge/buffer-exports.js",
    "url": "/napi-bridge/url-exports.js", "node:url": "/napi-bridge/url-exports.js",
    "util": "/napi-bridge/util-exports.js", "node:util": "/napi-bridge/util-exports.js",
    "crypto": "/napi-bridge/crypto-exports.js", "node:crypto": "/napi-bridge/crypto-exports.js",
    "process": "/napi-bridge/process-exports.js", "node:process": "/napi-bridge/process-exports.js",
    "fs": "/napi-bridge/fs-exports.js", "node:fs": "/napi-bridge/fs-exports.js",
    "path": "/napi-bridge/path-exports.js", "node:path": "/napi-bridge/path-exports.js",
    "os": "/napi-bridge/os-exports.js", "node:os": "/napi-bridge/os-exports.js",
    "string_decoder": "/napi-bridge/string_decoder-exports.js",
    "http": "/napi-bridge/http-exports.js", "node:http": "/napi-bridge/http-exports.js",
    "https": "/napi-bridge/https-exports.js", "node:https": "/napi-bridge/https-exports.js",
    "tls": "/napi-bridge/tls-exports.js", "node:tls": "/napi-bridge/tls-exports.js",
    "dns": "/napi-bridge/dns-exports.js", "node:dns": "/napi-bridge/dns-exports.js",
    "undici": "/napi-bridge/undici-stub.js",
    "zlib": "/napi-bridge/zlib-exports.js"
  }
}
</script>
<script>
  if (!globalThis.process) globalThis.process = { env: {}, versions: {}, platform: 'browser', argv: [] };
  if (!globalThis.process.env) globalThis.process.env = {};
  if (!globalThis.global) globalThis.global = globalThis;
</script>
</head>
<body>
<pre id="log"></pre>
<script type="module">
const log = document.getElementById('log');
function emit(msg) { log.textContent += msg + '\n'; console.log(msg); }

const params = new URLSearchParams(location.search);
globalThis.process.env.NODEJS_GVISOR_WS_URL = params.get('ws') || 'ws://localhost:8765';

const net = await import('net');

// Pick a random port (let the OS assign via port 0, or use a high random)
const port = 10000 + Math.floor(Math.random() * 50000);
emit(`[setup] will listen on port ${port}`);

const srv = net.createServer((socket) => {
  emit(`[connection] from ${socket.remoteAddress}:${socket.remotePort}`);
  socket.on('data', (data) => {
    const text = typeof data === 'string' ? data : new TextDecoder().decode(data);
    emit(`[data] ${text.trim()}`);
    socket.write('echo:' + text.trim());
  });
  socket.on('end', () => emit('[disconnected]'));
});

srv.listen(port, () => {
  emit(`[listening] port=${port}`);
});

srv.on('error', (err) => {
  emit(`[error] ${err.message}`);
});
</script>
</body></html>
