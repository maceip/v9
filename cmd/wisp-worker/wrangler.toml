name = "wisp-worker"
main = "worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Run the Worker as a module so imports work
[[rules]]
type = "ESModule"
globs = ["**/*.js"]

# Anti-abuse configuration. All are plain strings — change as needed.
[vars]
ORIGIN_ALLOWLIST = "https://maceip.github.io"
MAX_STREAMS_PER_SESSION = "32"
# Comma-separated, added to the default blocklist (25, 465, 587, 23, 6667, 6697)
EXTRA_BLOCKED_PORTS = ""

# Optional per-IP rate limiting via Cloudflare's native rate limiter.
# Uncomment and adjust to enable. Apply it in fetch() against CF-Connecting-IP.
# [[unsafe.bindings]]
# name = "WISP_RATE_LIMITER"
# type = "ratelimit"
# namespace_id = "9999"
# simple = { limit = 100, period = 60 }
