  <script>
    // ── Node.js global polyfills (must run before any ESM module loads) ──
    globalThis.global = globalThis;

    // setImmediate (Ink needs it)
    if (typeof globalThis.setImmediate === 'undefined') {
      globalThis.setImmediate = (fn, ...args) => globalThis.setTimeout(fn, 0, ...args);
      globalThis.clearImmediate = (id) => globalThis.clearTimeout(id);
    }

    // console.Console
    if (!globalThis.console.Console) {
      globalThis.console.Console = class Console {
        constructor(opts) {
          const out = opts?.stdout || { write: (s) => console.log(s) };
          const err = opts?.stderr || { write: (s) => console.error(s) };
          Object.assign(this, { log: (...a) => out.write(a.join(' ')+'\n'), error: (...a) => err.write(a.join(' ')+'\n'), warn: (...a) => err.write(a.join(' ')+'\n'), info: (...a) => out.write(a.join(' ')+'\n'), debug: (...a) => out.write(a.join(' ')+'\n'), trace: (...a) => out.write(a.join(' ')+'\n'), dir: (...a) => out.write(a.join(' ')+'\n'), time: ()=>{}, timeEnd: ()=>{}, timeLog: ()=>{}, assert: ()=>{}, count: ()=>{}, countReset: ()=>{}, group: ()=>{}, groupEnd: ()=>{}, table: (...a) => out.write(a.join(' ')+'\n'), clear: ()=>{} });
        }
      };
    }

    // CORS proxy intercept
    const PROXY_URL = 'http://localhost:8081'; // Local dev-server proxy
    const DOMAIN_PREFIX = { 'api.anthropic.com': '/anthropic', 'platform.claude.com': '/anthropic-platform', 'api.openai.com': '/openai', 'generativelanguage.googleapis.com': '/google' };
    const _origFetch = globalThis.fetch;
    globalThis.fetch = function(input, init) { let url = typeof input === 'string' ? input : input?.url || String(input); try { const u = new URL(url, location.href); const p = DOMAIN_PREFIX[u.hostname]; if (p) { url = PROXY_URL + p + u.pathname + u.search; if (typeof input === 'string') input = url; else if (input instanceof Request) input = new Request(url, input); } } catch {} return _origFetch.call(globalThis, input, init); };

    // Global process
    globalThis.process = { 
      env: {}, 
      ref() { return this; }, 
      unref() { return this; },
      on() { return this; },
      once() { return this; },
      emit() { return false; },
      removeListener() { return this; }
    };

    // Patch setTimeout/setInterval to return objects with .unref()/.ref()
    const _origST = globalThis.setTimeout, _origSI = globalThis.setInterval;
    globalThis.setTimeout = function(fn, ms, ...args) { 
      const id = _origST.call(globalThis, fn, ms, ...args); 
      const obj = { 
        [Symbol.toPrimitive]() { return id; }, 
        unref() { return this; }, 
        ref() { return this; }, 
        hasRef() { return true; }, 
        refresh() { return this; }, 
        _id: id 
      };
      // console.log(`[setTimeout] id=${id}`);
      return obj;
    };
    globalThis.setInterval = function(fn, ms, ...args) { 
      const id = _origSI.call(globalThis, fn, ms, ...args); 
      const obj = { 
        [Symbol.toPrimitive]() { return id; }, 
        unref() { return this; }, 
        ref() { return this; }, 
        hasRef() { return true; }, 
        refresh() { return this; }, 
        _id: id 
      };
      // console.log(`[setInterval] id=${id}`);
      return obj;
    };
    const _origCT = globalThis.clearTimeout, _origCI = globalThis.clearInterval;
    globalThis.clearTimeout = function(t) { return _origCT(t?._id ?? t); };
    globalThis.clearInterval = function(t) { return _origCI(t?._id ?? t); };

    // Global require fallback (for CJS bundles that expect it)
    globalThis.require = (id) => {
      if (globalThis.__edgeRuntime && typeof globalThis.__edgeRuntime.require === 'function') {
        return globalThis.__edgeRuntime.require(id);
      }
      // Check builtins directly if runtime not yet fully ready
      const clean = id.startsWith('node:') ? id.slice(5) : id;
      if (clean === 'process') return globalThis.process;
      if (clean === 'buffer') return { Buffer: globalThis.Buffer };
      throw new Error(`require('${id}') failed: runtime not initialized`);
    };

    // Global Buffer
    if (typeof globalThis.Buffer === 'undefined') {
      globalThis.Buffer = class Buffer extends Uint8Array {
        static from(v, enc) { return typeof v === 'string' ? new TextEncoder().encode(v) : new Uint8Array(v); }
        static alloc(n) { return new Uint8Array(n); }
        static allocUnsafe(n) { return new Uint8Array(n); }
        static isBuffer(o) { return o instanceof Uint8Array; }
        static byteLength(str) { return typeof str === 'string' ? new TextEncoder().encode(str).length : str.length; }
        static concat(list, len) { const t = len ?? list.reduce((s,b) => s+b.length, 0); const r = new Uint8Array(t); let o = 0; for (const b of list) { r.set(b, o); o += b.length; } return r; }

      };
