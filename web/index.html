  <!-- Lock document base to …/web/ so importmap "../napi-bridge/*" resolves under project Pages (/repo/), not github.io root. -->
  <script>
  (function () {
    var b = document.createElement('base');
    b.href = new URL('.', location.href).href;
    var t = document.querySelector('head > title');
    if (t && t.nextSibling) document.head.insertBefore(b, t.nextSibling);
    else document.head.appendChild(b);
  })();
  </script>

    body { background: #1a1b26; }
    #terminal { width: 100%; height: 100%; overflow: hidden; }
    /* Hide xterm scrollbar — parent page handles scrolling */
    .xterm-viewport { overflow-y: hidden !important; }
    .xterm-viewport::-webkit-scrollbar { display: none; }
    .xterm-viewport { scrollbar-width: none; }
  </style>
