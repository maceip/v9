syntax = "proto3";

package grpc_exec;

import "google/protobuf/duration.proto";

option go_package = "github.com/maceip/v9/grpc_exec/grpcexecpb";

// A simple command execution service.
service ExecService {
  // Executes a command and streams output until completion. The first
  // ClientEvent must be a StartCommandRequest; subsequent events may
  // include TerminateCommand.
  rpc RunCommand(stream ClientEvent) returns (stream ServerEvent);
}

// A single-stream TCP tunnel service used as the sole supported network
// transport path for browser/remote V9 clients.
service TunnelService {
  // Opens a TCP connection to the requested address/port and multiplexes
  // bytes over the gRPC stream. The first TunnelClientEvent must be an
  // OpenTcpRequest.
  rpc OpenTcp(stream TunnelClientEvent) returns (stream TunnelServerEvent);
}

message ClientEvent {
  oneof event {
    // Must be the first message on the stream.
    StartCommandRequest start = 1;

    // Request termination of the running command.
    TerminateCommand terminate = 2;
  }
}

message StartCommandRequest {
  // The raw shell command to execute.
  string command_line = 1;

  // The directory to execute the command in.
  string working_dir = 2;
}

message TerminateCommand {
  // When false, send SIGTERM only (grace_period is ignored).
  // When true, guarantee the process dies via SIGKILL. If grace_period
  // is set, send SIGTERM first and SIGKILL after the grace period;
  // otherwise send SIGKILL immediately.
  bool force = 1;

  // Only used when force is true. If non-zero, SIGTERM is sent first
  // and SIGKILL follows after this duration.
  google.protobuf.Duration grace_period = 2;
}

message ServerEvent {
  oneof event {
    // Incremental stdout/stderr from the command.
    bytes output = 1;

    // Sent exactly once when the command finishes.
    ExitInfo exited = 2;

    // Sent once after the command starts, before any output.
    CommandStarted started = 3;
  }
}

message CommandStarted {
  // Opaque identifier for this command invocation.
  string command_id = 1;
}

message ExitInfo {
  int32 exit_code = 1;
  // Populated only if the system failed to execute the command at all.
  string error_message = 2;
}

message TunnelClientEvent {
  oneof event {
    // Must be the first message on the stream.
    OpenTcpRequest open = 1;

    // Bytes to write to the remote connection.
    bytes data = 2;

    // Close the active connection.
    CloseTunnel close = 3;
  }
}

message OpenTcpRequest {
  string address = 1;
  uint32 port = 2;
}

message CloseTunnel {}

message TunnelServerEvent {
  oneof event {
    // Sent once when the TCP connection is established.
    TunnelOpened opened = 1;

    // Bytes received from the remote connection.
    bytes data = 2;

    // Sent once when the connection is closed cleanly.
    TunnelClosed closed = 3;

    // Sent on dialing/proxying failure before the stream ends.
    TunnelError error = 4;
  }
}

message TunnelOpened {
  string remote_address = 1;
  uint32 remote_port = 2;
}

message TunnelClosed {
  string reason = 1;
}

message TunnelError {
  string message = 1;
}
